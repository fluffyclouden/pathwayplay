<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaboloMap</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: white;
      color: #333;
      padding: 0;
    }

    .sidebar-menu {
      padding: 0;
    }

    .sidebar-menu .menu-header {
      text-align: center;
      padding: 4px 0 12px;
      border-bottom: 1px solid #e8eee8;
      margin-bottom: 8px;
    }

    .sidebar-menu .menu-header h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #244d3d;
      margin: 0;
      letter-spacing: 0.3px;
    }

    .sidebar-menu .menu-header p {
      font-size: 0.7rem;
      color: #888;
      margin-top: 2px;
      font-weight: 400;
    }

    .sidebar-menu nav ul {
      list-style: none;
    }

    .sidebar-menu nav ul li {
      margin-bottom: 4px;
    }

    .sidebar-menu nav ul li a {
      text-decoration: none;
      color: #333;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.85rem;
      transition: all 0.15s ease;
      background: #f8faf8;
      border-left: 3px solid transparent;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }

    .sidebar-menu nav ul li a:active {
      background: #e8f0e8;
      transform: scale(0.98);
    }

    .sidebar-menu nav ul li a .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sidebar-menu nav ul li a:hover {
      background: #edf5ed;
      border-left-color: #4f9d6b;
      transform: translateX(2px);
    }

    .sidebar-menu nav ul li:nth-child(1) a .dot { background: #CB670F; }
    .sidebar-menu nav ul li:nth-child(2) a .dot { background: #9e000b; }
    .sidebar-menu nav ul li:nth-child(3) a .dot { background: #32bf82; }
    .sidebar-menu nav ul li:nth-child(4) a .dot { background: #2ac942; }
    .sidebar-menu nav ul li:nth-child(5) a .dot { background: #3a32ad; }
    .sidebar-menu nav ul li:nth-child(6) a .dot { background: #f0c402; }
    .sidebar-menu nav ul li:nth-child(7) a .dot { background: #620080; }
    .sidebar-menu nav ul li:nth-child(8) a .dot { background: #cc1f67; }

    .sidebar-menu nav ul li:nth-child(1) a:hover { border-left-color: #CB670F; }
    .sidebar-menu nav ul li:nth-child(2) a:hover { border-left-color: #9e000b; }
    .sidebar-menu nav ul li:nth-child(3) a:hover { border-left-color: #32bf82; }
    .sidebar-menu nav ul li:nth-child(4) a:hover { border-left-color: #2ac942; }
    .sidebar-menu nav ul li:nth-child(5) a:hover { border-left-color: #3a32ad; }
    .sidebar-menu nav ul li:nth-child(6) a:hover { border-left-color: #f0c402; }
    .sidebar-menu nav ul li:nth-child(7) a:hover { border-left-color: #620080; }
    .sidebar-menu nav ul li:nth-child(8) a:hover { border-left-color: #cc1f67; }

    @media (max-width: 768px) {
      .sidebar-menu .menu-header { padding-top: 0; }
      .sidebar-menu .menu-header h2 { font-size: 0.95rem; }
      .sidebar-menu nav ul li a { padding: 14px 14px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="sidebar-menu">
    <div class="menu-header">
      <h2>⌕ MetaboloMap</h2>
      <p>Click a pathway to explore</p>
    </div>
    <nav>
      <ul>
        <li><a href="glycolysis.html" target="content"><span class="dot"></span>Glycolysis</a></li>
        <li><a href="pdh_tca.html" target="content"><span class="dot"></span>PDH and TCA</a></li>
        <li><a href="etc.html" target="content"><span class="dot"></span>ETC</a></li>
        <li><a href="gluconeogenesis.html" target="content"><span class="dot"></span>Gluconeogenesis</a></li>
        <li><a href="glycogen.html" target="content"><span class="dot"></span>Glycogen Metabolism</a></li>
        <li><a href="fatty_acid.html" target="content"><span class="dot"></span>Fatty Acid Metabolism</a></li>
        <li><a href="hmp.html" target="content"><span class="dot"></span>HMP</a></li>
        <li><a href="nitrogen_metabolism.html" target="content"><span class="dot"></span>Nitrogen Metabolism</a></li>
      </ul>
    </nav>
  </div>

  <script>
    // Notify parent to close drawer when navigating
    document.querySelectorAll('.sidebar-menu nav a').forEach(function (link) {
      link.addEventListener('click', function () {
        try { window.parent.postMessage('nav-clicked', '*'); } catch (e) {}
      });
    });
  </script>
</body>
</html>
