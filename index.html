<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PathwayPlay</title>
  <link rel="stylesheet" href="pathwayplay.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f7f5;
      color: #333;
    }

    .navbar {
      background: linear-gradient(135deg, #244d3d, #4f9d6b);
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 56px;
      z-index: 1000;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .navbar .brand {
      font-size: 1.3rem;
      font-weight: 600;
      color: white;
      text-decoration: none;
      letter-spacing: 0.5px;
    }

    .navbar .brand u { text-decoration: none; }

    .navbar nav { display: flex; gap: 8px; }

    .navbar nav a {
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 500;
      font-size: 0.9rem;
      transition: background 0.2s, color 0.2s;
    }

    .navbar nav a:hover {
      background: rgba(255,255,255,0.15);
      color: white;
    }

    .layout {
      display: flex;
      min-height: 100vh;
      padding-top: 56px;
    }

    .sidebar {
      width: 260px;
      min-width: 260px;
      background: white;
      border-right: 1px solid #e0e6e0;
      padding: 16px;
      position: fixed;
      top: 56px;
      left: 0;
      bottom: 0;
      overflow-y: auto;
      z-index: 100;
    }

    .sidebar iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 0;
      background: white;
      min-height: calc(100vh - 56px);
    }

    .main-content iframe {
      width: 100%;
      height: 100%;
      border: none;
      min-height: calc(100vh - 56px);
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 200px;
        min-width: 200px;
      }
      .main-content { margin-left: 200px; }
    }

    @media (max-width: 600px) {
      .sidebar {
        width: 100%;
        min-width: unset;
        position: relative;
        top: 0;
        height: auto;
        max-height: 200px;
        border-right: none;
        border-bottom: 1px solid #e0e6e0;
      }
      .main-content { margin-left: 0; }
      .layout { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <a href="index.html" class="brand"><u>pathwayplay.net</u></a>
    <nav>
      <a href="home.html" target="content">Home</a>
      <a href="resources.html" target="content">Resources</a>
    </nav>
  </div>

  <div class="layout">
    <div class="sidebar">
      <iframe src="metabolomap.html" name="menu"></iframe>
    </div>
    <div class="main-content">
      <iframe src="home.html" name="content"></iframe>
    </div>
  </div>

</body>
</html>
